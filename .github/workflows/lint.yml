name: syntax-check
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check
        run: |
          for f in mt/*.py qe/*.py demos/mt/*.py demos/qe/*.py; do
            python3 -m py_compile "$f" && echo "OK: $f"
          done
